<!DOCTYPE html>

<head>
<title>Personal Information</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BODY BACKGROUND ANIMATION */
body{
min-height:100vh;
display:flex;
flex-direction:column;

background:linear-gradient(270deg,
#ff0000,
#ff9900,
#00ff00,
#00ffff,
#0000ff,
#ff00ff,
#ff0000);

background-size:1200% 1200%;
animation:bgMove 15s infinite;

color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */
nav{
background:black;
padding:15px;
}

nav ul{
list-style:none;
text-align:center;
}

nav ul li{
display:inline;
margin:20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
}

nav ul li a:hover{
color:#00ffff;
}

/* SECTION */
section{
padding:50px;
text-align:center;
}

/* TITLE */
h1{
font-size:50px;
margin-bottom:40px;

background:linear-gradient(90deg,#00ffff,#00ff00,#ff00ff);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */
.info-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

/* CARD */
.info-card{
width:260px;
padding:25px;

background:rgba(0,0,0,0.7);

border-radius:20px;

border:3px solid white;

box-shadow:0 0 20px rgba(255,255,255,0.5);

transition:0.4s;
}

/* HOVER */
.info-card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 35px #00ffff;
border-color:#00ffff;
}

/* TITLE */
.info-card h3{
margin-bottom:10px;
color:#00ffff;
}

/* TEXT */
.info-card p{
font-size:18px;
color:#ddd;
}

/* FOOTER */
footer{
background:black;
text-align:center;
padding:15px;
margin-top:auto;
}

</style>

</head>
