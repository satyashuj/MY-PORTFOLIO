<!DOCTYPE html>
<html>
<head>
<title>Skills</title>
<style>

/* BODY BACKGROUND ANIMATION */
body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
background-size:800% 800%;
animation:bgMove 15s infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */
nav{
background:black;
padding:15px;
}

nav ul{
list-style:none;
text-align:center;
}

nav ul li{
display:inline;
margin:20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
}

nav ul li a:hover{
color:cyan;
}

/* SECTION */
section{
padding:50px;
text-align:center;
color:white;
}

h1{
font-size:40px;
margin-bottom:40px;
}

/* SKILL BOX */
.skill-box{

display:inline-block;
margin:15px;
padding:15px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
transition:0.4s;

/* multicolor animation */
background:linear-gradient(270deg,#ff0000,#ff9900,#00cc00,#0066ff,#cc00ff);
background-size:800% 800%;
animation:skillColor 6s infinite;

color:white;
box-shadow:0 0 10px black;

}

@keyframes skillColor{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HOVER */
.skill-box:hover{
background:linear-gradient(90deg,#00ffff,#00ff99);
color:black;
transform:scale(1.15);
animation:none;
}

/* CLICK */
.skill-box:active{
background:black;
color:white;
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
position:fixed;
bottom:0;
width:100%;
}

</style>

</head>

<script>

/* CLICK PAR RANDOM COLOR CHANGE */
function changeSkillColor(element){

var colors = [
"#ff0000",
"#00ff00",
"#0000ff",
"#ff00ff",
"#00ffff",
"#ffff00",
"#ff8800"
];

var random = colors[Math.floor(Math.random()*colors.length)];

element.style.background = random;
element.style.color = "white";

}
